{{/*
PodDisruptionBudget for DragonflyDB
Note: The Dragonfly Operator manages its own PDB when using the CR.
This template is kept for backward compatibility with non-operator deployments.
*/}}
{{- if .Values.dragonflyOperator.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "dependency-control.fullname" . }}-dragonfly
  labels:
    {{- include "dependency-control.labels" . | nindent 4 }}
    app.kubernetes.io/component: cache
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: {{ include "dependency-control.fullname" . }}-dragonfly
{{- end }}
