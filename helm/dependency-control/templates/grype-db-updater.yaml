{{- if .Values.grypeDbUpdater.enabled }}
# Grype DB Updater: CronJob that downloads the Grype vulnerability database
# to a GCS bucket. Backend pods mount it read-only via GCSFuse.
# This saves ~1.4GB ephemeral storage per backend pod.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "dependency-control.fullname" . }}-grype-db-updater
  labels:
    {{- include "dependency-control.labels" . | nindent 4 }}
    app.kubernetes.io/component: grype-db-updater
spec:
  schedule: "{{ .Values.grypeDbUpdater.schedule | default "0 */6 * * *" }}"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            app.kubernetes.io/component: grype-db-updater
          annotations:
            gke-gcsfuse/volumes: "true"
        spec:
          {{- with .Values.global.imagePullSecrets }}
          imagePullSecrets:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          serviceAccountName: {{ include "dependency-control.fullname" . }}-grype-updater
          restartPolicy: OnFailure
          securityContext:
            fsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: grype-updater
              image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag | default .Chart.AppVersion }}"
              command: ["/bin/sh", "-c"]
              args:
                - |
                  echo "Updating Grype vulnerability database..."
                  export GRYPE_DB_CACHE_DIR=/tmp/grype-db
                  mkdir -p $GRYPE_DB_CACHE_DIR
                  grype db update
                  echo "Copying database to GCS bucket via GCSFuse mount..."
                  rm -rf /grype-gcs/*
                  cp -r $GRYPE_DB_CACHE_DIR/* /grype-gcs/
                  echo "Grype DB update completed successfully"
                  ls -lhR /grype-gcs/
              securityContext:
                runAsUser: 1000
                runAsNonRoot: true
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
              volumeMounts:
                - name: grype-gcs
                  mountPath: /grype-gcs
                - name: tmp
                  mountPath: /tmp
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
                  ephemeral-storage: 4Gi
          volumes:
            - name: grype-gcs
              csi:
                driver: gcsfuse.csi.storage.gke.io
                volumeAttributes:
                  bucketName: {{ .Values.grypeDbUpdater.gcsBucket }}
            - name: tmp
              emptyDir:
                sizeLimit: 4Gi
{{- end }}
