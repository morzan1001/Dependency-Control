apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dependency-control.fullname" . }}-backend
  labels:
    {{- include "dependency-control.labels" . | nindent 4 }}
spec:
  {{- if not .Values.backend.autoscaling.enabled }}
  replicas: {{ .Values.backend.replicaCount }}
  {{- end }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "dependency-control.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "dependency-control.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: backend
      {{- if .Values.grypeDbUpdater.enabled }}
      annotations:
        gke-gcsfuse/volumes: "true"
      {{- end }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "dependency-control.serviceAccountName" . }}
      automountServiceAccountToken: false
      # Ensure pods are spread across nodes for HA
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                        - "{{ include "dependency-control.name" . }}"
                    - key: app.kubernetes.io/component
                      operator: In
                      values:
                        - backend
                topologyKey: "kubernetes.io/hostname"
      {{- with .Values.backend.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      # Graceful shutdown: Allow time for workers to finish current scans
      terminationGracePeriodSeconds: {{ .Values.backend.terminationGracePeriodSeconds | default 30 }}
      securityContext:
        fsGroup: {{ .Values.backend.securityContext.fsGroup }}
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: tmp-volume
          emptyDir: {}
        - name: cache-volume
          emptyDir: {}
        {{- if .Values.grypeDbUpdater.enabled }}
        - name: grype-db
          csi:
            driver: gcsfuse.csi.storage.gke.io
            readOnly: true
            volumeAttributes:
              bucketName: {{ .Values.grypeDbUpdater.gcsBucket }}
        {{- end }}
        {{- if .Values.global.tls.enabled }}
        # Internal CA Certificate for TLS verification
        {{- if eq .Values.global.tls.source "certManager" }}
        - name: internal-ca
          secret:
            secretName: {{ include "dependency-control.fullname" . }}-root-ca-secret
            items:
              - key: ca.crt
                path: ca.crt
        {{- else if and (eq .Values.global.tls.source "custom") .Values.global.tls.custom.caSecretName }}
        - name: internal-ca
          secret:
            secretName: {{ .Values.global.tls.custom.caSecretName }}
            items:
              - key: ca.crt
                path: ca.crt
        {{- end }}
        # Backend TLS certificate for serving HTTPS
        {{- if eq .Values.global.tls.source "certManager" }}
        - name: backend-tls
          secret:
            secretName: {{ include "dependency-control.fullname" . }}-backend-tls
        # Combined PEM (cert+key) for MongoDB client authentication
        # Generated by cert-manager's additionalOutputFormats: CombinedPEM
        - name: mongodb-client-tls
          secret:
            secretName: {{ include "dependency-control.fullname" . }}-backend-tls
            items:
              - key: tls-combined.pem
                path: client.pem
        {{- else if and (eq .Values.global.tls.source "custom") .Values.global.tls.custom.backend.secretName }}
        - name: backend-tls
          secret:
            secretName: {{ .Values.global.tls.custom.backend.secretName }}
        {{- end }}
        {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            runAsUser: {{ .Values.backend.securityContext.runAsUser }}
            runAsGroup: {{ .Values.backend.securityContext.runAsGroup }}
            runAsNonRoot: {{ .Values.backend.securityContext.runAsNonRoot }}
            readOnlyRootFilesystem: {{ .Values.backend.securityContext.readOnlyRootFilesystem }}
            allowPrivilegeEscalation: {{ .Values.backend.securityContext.allowPrivilegeEscalation }}
            capabilities:
              drop:
                {{- toYaml .Values.backend.securityContext.capabilities.drop | nindent 16 }}
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          volumeMounts:
            - mountPath: /tmp
              name: tmp-volume
            - mountPath: /app/.cache
              name: cache-volume
            {{- if .Values.grypeDbUpdater.enabled }}
            - mountPath: /app/.cache/grype
              name: grype-db
              readOnly: true
            {{- end }}
            {{- if .Values.global.tls.enabled }}
            # Mount internal CA for certificate verification
            {{- if or (eq .Values.global.tls.source "certManager") (and (eq .Values.global.tls.source "custom") .Values.global.tls.custom.caSecretName) }}
            - name: internal-ca
              mountPath: {{ .Values.global.tls.caMountPath }}
              readOnly: true
            {{- end }}
            # Mount backend TLS certificate for serving HTTPS
            {{- if or (eq .Values.global.tls.source "certManager") (and (eq .Values.global.tls.source "custom") .Values.global.tls.custom.backend.secretName) }}
            - name: backend-tls
              mountPath: /app/certs
              readOnly: true
            {{- end }}
            # Mount combined PEM for MongoDB client authentication
            {{- if eq .Values.global.tls.source "certManager" }}
            - name: mongodb-client-tls
              mountPath: /app/mongodb-tls
              readOnly: true
            {{- end }}
            {{- end }}
          ports:
            {{- if .Values.global.tls.enabled }}
            - name: https
              containerPort: 8443
              protocol: TCP
            {{- else }}
            - name: http
              containerPort: 8000
              protocol: TCP
            {{- end }}
          startupProbe:
            httpGet:
              path: /health/ready
              {{- if .Values.global.tls.enabled }}
              port: https
              scheme: HTTPS
              {{- else }}
              port: http
              {{- end }}
            initialDelaySeconds: {{ .Values.backend.probes.startup.initialDelaySeconds }}
            periodSeconds: {{ .Values.backend.probes.startup.periodSeconds }}
            failureThreshold: {{ .Values.backend.probes.startup.failureThreshold }}
            timeoutSeconds: {{ .Values.backend.probes.startup.timeoutSeconds }}
          livenessProbe:
            httpGet:
              path: /health/live
              {{- if .Values.global.tls.enabled }}
              port: https
              scheme: HTTPS
              {{- else }}
              port: http
              {{- end }}
            initialDelaySeconds: {{ .Values.backend.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.backend.probes.liveness.periodSeconds }}
            failureThreshold: {{ .Values.backend.probes.liveness.failureThreshold }}
            timeoutSeconds: {{ .Values.backend.probes.liveness.timeoutSeconds }}
          readinessProbe:
            httpGet:
              path: /health/ready
              {{- if .Values.global.tls.enabled }}
              port: https
              scheme: HTTPS
              {{- else }}
              port: http
              {{- end }}
            initialDelaySeconds: {{ .Values.backend.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.backend.probes.readiness.periodSeconds }}
            failureThreshold: {{ .Values.backend.probes.readiness.failureThreshold }}
            timeoutSeconds: {{ .Values.backend.probes.readiness.timeoutSeconds }}
          env:
            - name: MONGODB_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "dependency-control.fullname" . }}-secrets
                  key: mongodb-url
            {{- if .Values.dragonflyOperator.enabled }}
            # DragonflyDB (Redis-compatible) connection
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "dependency-control.fullname" . }}-secrets
                  key: redis-url
            {{- end }}
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "dependency-control.fullname" . }}-secrets
                  key: secret-key
            - name: WORKER_COUNT
              value: "{{ .Values.backend.env.workerCount }}"
            - name: LOG_LEVEL
              value: "{{ .Values.backend.env.logLevel }}"
            - name: ALGORITHM
              value: "{{ .Values.backend.env.algorithm }}"
            - name: ACCESS_TOKEN_EXPIRE_MINUTES
              value: "{{ .Values.backend.env.accessTokenExpireMinutes }}"
            - name: REFRESH_TOKEN_EXPIRE_DAYS
              value: "{{ .Values.backend.env.refreshTokenExpireDays }}"
            - name: FRONTEND_BASE_URL
              value: "{{ .Values.backend.env.frontendBaseUrl }}"
            # Pod lifecycle: max uptime before automatic restart (helps manage memory)
            - name: MAX_POD_UPTIME_SECONDS
              value: "{{ .Values.backend.env.maxPodUptimeSeconds | default 86400 }}"
            # MongoDB read preference for replica sets (distributes read load)
            - name: MONGODB_READ_PREFERENCE
              value: "{{ .Values.backend.env.mongodbReadPreference | default "secondaryPreferred" }}"
            {{- if .Values.trivyServer.enabled }}
            # Trivy Server: send scans via HTTP to central server (no local DB needed)
            - name: TRIVY_SERVER_URL
              value: "http://{{ include "dependency-control.fullname" . }}-trivy-server:4954"
            {{- end }}
            {{- if .Values.grypeDbUpdater.enabled }}
            # Grype: use shared DB from PersistentVolume (no local download needed)
            - name: GRYPE_DB_SHARED
              value: "true"
            {{- end }}
            {{- if .Values.global.tls.enabled }}
            # TLS environment variables
            - name: TLS_ENABLED
              value: "true"
            - name: TLS_CA_PATH
              value: "{{ .Values.global.tls.caMountPath }}/ca.crt"
            - name: TLS_CERT_PATH
              value: "/app/certs/tls.crt"
            - name: TLS_KEY_PATH
              value: "/app/certs/tls.key"
            {{- end }}
            {{- if .Values.archiving.enabled }}
            # S3-compatible archive storage
            - name: S3_ENDPOINT_URL
              value: "{{ .Values.archiving.s3.endpoint }}"
            - name: S3_BUCKET_NAME
              value: "{{ .Values.archiving.s3.bucket }}"
            - name: S3_REGION
              value: "{{ .Values.archiving.s3.region }}"
            - name: S3_USE_SSL
              value: "{{ .Values.archiving.s3.useSSL }}"
            {{- $s3SecretName := .Values.archiving.s3.existingSecret | default (printf "%s-s3-credentials" (include "dependency-control.fullname" .)) }}
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $s3SecretName }}
                  key: access-key
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $s3SecretName }}
                  key: secret-key
            {{- if .Values.archiving.encryption.enabled }}
            {{- $encSecretName := .Values.archiving.encryption.existingSecret | default (printf "%s-archive-encryption" (include "dependency-control.fullname" .)) }}
            - name: ARCHIVE_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $encSecretName }}
                  key: encryption-key
            {{- end }}
            {{- end }}
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
