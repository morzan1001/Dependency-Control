{{- if .Values.trivyServer.enabled }}
# Trivy Server: Central vulnerability database service
# Backend pods send SBOMs here via HTTP instead of running local Trivy CLI.
# This saves ~1GB ephemeral storage per backend pod and centralizes DB updates.
# StatefulSet ensures each replica gets its own persistent cache volume.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "dependency-control.fullname" . }}-trivy-server
  labels:
    {{- include "dependency-control.labels" . | nindent 4 }}
    app.kubernetes.io/component: trivy-server
spec:
  serviceName: {{ include "dependency-control.fullname" . }}-trivy-server-headless
  replicas: {{ .Values.trivyServer.replicaCount | default 2 }}
  podManagementPolicy: Parallel
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      {{- include "dependency-control.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: trivy-server
  template:
    metadata:
      labels:
        {{- include "dependency-control.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: trivy-server
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              {{- include "dependency-control.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: trivy-server
      containers:
        - name: trivy-server
          image: "{{ .Values.trivyServer.image.repository }}:{{ .Values.trivyServer.image.tag }}"
          imagePullPolicy: {{ .Values.trivyServer.image.pullPolicy | default "IfNotPresent" }}
          args:
            - server
            - --listen
            - "0.0.0.0:4954"
            - --cache-dir
            - /trivy-cache
            - --db-repository
            - ghcr.io/aquasecurity/trivy-db:2
          ports:
            - name: http
              containerPort: 4954
              protocol: TCP
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 60
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
          securityContext:
            runAsUser: 1000
            runAsNonRoot: true
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: trivy-cache
              mountPath: /trivy-cache
            - name: tmp
              mountPath: /tmp
          resources:
            {{- toYaml .Values.trivyServer.resources | nindent 12 }}
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 1Gi
  {{- if .Values.trivyServer.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: trivy-cache
        labels:
          {{- include "dependency-control.labels" . | nindent 10 }}
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: {{ .Values.trivyServer.persistence.size | default "5Gi" }}
        {{- if .Values.trivyServer.persistence.storageClass }}
        storageClassName: {{ .Values.trivyServer.persistence.storageClass }}
        {{- end }}
  {{- else }}
      {{- /* When persistence is disabled, use emptyDir for cache */}}
        - name: trivy-cache
          emptyDir:
            sizeLimit: 5Gi
  {{- end }}
---
# Headless Service required by StatefulSet
apiVersion: v1
kind: Service
metadata:
  name: {{ include "dependency-control.fullname" . }}-trivy-server-headless
  labels:
    {{- include "dependency-control.labels" . | nindent 4 }}
    app.kubernetes.io/component: trivy-server
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: 4954
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "dependency-control.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: trivy-server
---
# Regular Service for load-balanced access from backend
apiVersion: v1
kind: Service
metadata:
  name: {{ include "dependency-control.fullname" . }}-trivy-server
  labels:
    {{- include "dependency-control.labels" . | nindent 4 }}
    app.kubernetes.io/component: trivy-server
spec:
  type: ClusterIP
  ports:
    - port: 4954
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "dependency-control.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: trivy-server
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "dependency-control.fullname" . }}-trivy-server
  labels:
    {{- include "dependency-control.labels" . | nindent 4 }}
    app.kubernetes.io/component: trivy-server
spec:
  minAvailable: 1
  selector:
    matchLabels:
      {{- include "dependency-control.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: trivy-server
{{- end }}
