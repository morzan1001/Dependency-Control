{{- if .Values.ollama.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dependency-control.fullname" . }}-ollama
  labels:
    app.kubernetes.io/component: ollama
    {{- include "dependency-control.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/component: ollama
      {{- include "dependency-control.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: ollama
        {{- include "dependency-control.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "dependency-control.fullname" . }}-ollama
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      initContainers:
        - name: model-pull
          image: "{{ .Values.ollama.image.repository }}:{{ .Values.ollama.image.tag }}"
          command:
            - sh
            - -c
            - |
              set -e
              echo "Starting Ollama in background to pull model..."
              /bin/ollama serve &
              OLLAMA_PID=$!
              # Wait for ollama to be reachable
              until curl -sf http://localhost:11434/ > /dev/null 2>&1; do
                sleep 2
              done
              echo "Pulling model: {{ .Values.ollama.model }}"
              /bin/ollama pull {{ .Values.ollama.model }}
              echo "Model pulled. Stopping background Ollama."
              kill $OLLAMA_PID || true
              wait $OLLAMA_PID 2>/dev/null || true
              echo "Model pull complete."
          env:
            - name: OLLAMA_HOST
              value: "0.0.0.0"
            - name: HOME
              value: "/home/ollama"
          volumeMounts:
            - name: ollama-data
              mountPath: /home/ollama/.ollama
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2"
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: false
      containers:
        - name: ollama
          image: "{{ .Values.ollama.image.repository }}:{{ .Values.ollama.image.tag }}"
          ports:
            - containerPort: 11434
              protocol: TCP
          resources:
            requests:
              memory: {{ .Values.ollama.resources.requests.memory | quote }}
              cpu: {{ .Values.ollama.resources.requests.cpu | quote }}
              {{- if .Values.ollama.gpu.enabled }}
              nvidia.com/gpu: {{ .Values.ollama.gpu.count | quote }}
              {{- end }}
            limits:
              memory: {{ .Values.ollama.resources.limits.memory | quote }}
              cpu: {{ .Values.ollama.resources.limits.cpu | quote }}
              {{- if .Values.ollama.gpu.enabled }}
              nvidia.com/gpu: {{ .Values.ollama.gpu.count | quote }}
              {{- end }}
          volumeMounts:
            - name: ollama-data
              mountPath: /home/ollama/.ollama
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: false
          livenessProbe:
            httpGet:
              path: /
              port: 11434
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - "/bin/ollama list | grep -q '{{ .Values.ollama.model }}'"
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 30
            timeoutSeconds: 5
          env:
            - name: OLLAMA_HOST
              value: "0.0.0.0"
            - name: HOME
              value: "/home/ollama"
      volumes:
        - name: ollama-data
          {{- if .Values.ollama.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "dependency-control.fullname" . }}-ollama
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- with .Values.ollama.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.ollama.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.ollama.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
