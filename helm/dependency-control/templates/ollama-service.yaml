{{- if .Values.ollama.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "dependency-control.fullname" . }}-ollama
  labels:
    app.kubernetes.io/component: ollama
    {{- include "dependency-control.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 11434
      targetPort: 11434
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/component: ollama
    {{- include "dependency-control.selectorLabels" . | nindent 4 }}
{{- end }}
