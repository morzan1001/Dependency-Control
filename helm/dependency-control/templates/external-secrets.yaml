{{- if and (eq .Values.secrets.provider "external-secrets") .Values.secrets.externalSecrets.enabled }}
---
# External Secret for Backend Secret Key
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "dependency-control.fullname" . }}-backend-secret
  labels:
    {{- include "dependency-control.labels" . | nindent 4 }}
spec:
  secretStoreRef:
    {{- if .Values.secrets.externalSecrets.clusterSecretStore }}
    name: {{ .Values.secrets.externalSecrets.secretStore }}
    kind: ClusterSecretStore
    {{- else }}
    name: {{ .Values.secrets.externalSecrets.secretStore }}
    kind: SecretStore
    {{- end }}
  refreshInterval: {{ .Values.secrets.externalSecrets.refreshInterval | default "1h" }}
  target:
    name: {{ include "dependency-control.fullname" . }}-secrets
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        secret-key: "{{ `{{ .backendSecretKey }}` }}"
  data:
    - secretKey: backendSecretKey
      remoteRef:
        key: {{ .Values.secrets.externalSecrets.paths.backendSecretKey }}

---
# External Secret for Database Password
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "dependency-control.fullname" . }}-db-password
  labels:
    {{- include "dependency-control.labels" . | nindent 4 }}
spec:
  secretStoreRef:
    {{- if .Values.secrets.externalSecrets.clusterSecretStore }}
    name: {{ .Values.secrets.externalSecrets.secretStore }}
    kind: ClusterSecretStore
    {{- else }}
    name: {{ .Values.secrets.externalSecrets.secretStore }}
    kind: SecretStore
    {{- end }}
  refreshInterval: {{ .Values.secrets.externalSecrets.refreshInterval | default "1h" }}
  target:
    {{- if eq .Values.database.type "mongodb" }}
    name: {{ .Values.database.cluster.name }}-user-password
    {{- else }}
    name: {{ .Values.database.cluster.name }}-app-user
    {{- end }}
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        password: "{{ `{{ .dbPassword }}` }}"
  data:
    - secretKey: dbPassword
      remoteRef:
        key: {{ .Values.secrets.externalSecrets.paths.dbPassword }}

{{- if eq .Values.database.type "percona" }}
---
# External Secret for Percona Cluster Secrets
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "dependency-control.fullname" . }}-percona-secrets
  labels:
    {{- include "dependency-control.labels" . | nindent 4 }}
spec:
  secretStoreRef:
    {{- if .Values.secrets.externalSecrets.clusterSecretStore }}
    name: {{ .Values.secrets.externalSecrets.secretStore }}
    kind: ClusterSecretStore
    {{- else }}
    name: {{ .Values.secrets.externalSecrets.secretStore }}
    kind: SecretStore
    {{- end }}
  refreshInterval: {{ .Values.secrets.externalSecrets.refreshInterval | default "1h" }}
  target:
    name: {{ .Values.database.cluster.name }}-secrets
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        MONGODB_BACKUP_PASSWORD: "{{ `{{ .dbPassword }}` }}"
        MONGODB_CLUSTER_ADMIN_PASSWORD: "{{ `{{ .dbPassword }}` }}"
        MONGODB_CLUSTER_MONITOR_PASSWORD: "{{ `{{ .dbPassword }}` }}"
        MONGODB_USER_ADMIN_PASSWORD: "{{ `{{ .dbPassword }}` }}"
  data:
    - secretKey: dbPassword
      remoteRef:
        key: {{ .Values.secrets.externalSecrets.paths.dbPassword }}

---
# External Secret for Percona Encryption Key
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "dependency-control.fullname" . }}-percona-encryption
  labels:
    {{- include "dependency-control.labels" . | nindent 4 }}
spec:
  secretStoreRef:
    {{- if .Values.secrets.externalSecrets.clusterSecretStore }}
    name: {{ .Values.secrets.externalSecrets.secretStore }}
    kind: ClusterSecretStore
    {{- else }}
    name: {{ .Values.secrets.externalSecrets.secretStore }}
    kind: SecretStore
    {{- end }}
  refreshInterval: {{ .Values.secrets.externalSecrets.refreshInterval | default "1h" }}
  target:
    name: {{ .Values.database.cluster.name }}-encryption-key
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        encryption-key: "{{ `{{ .encryptionKey }}` }}"
  data:
    - secretKey: encryptionKey
      remoteRef:
        key: {{ .Values.secrets.externalSecrets.paths.dbEncryptionKey }}
{{- end }}

{{- if .Values.dragonflyOperator.enabled }}
---
# External Secret for DragonflyDB Password
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "dependency-control.fullname" . }}-dragonfly-password
  labels:
    {{- include "dependency-control.labels" . | nindent 4 }}
  annotations:
    # This secret is used to update the dragonfly subchart password
    # The dragonfly chart expects the password to be in a specific format
    "helm.sh/resource-policy": keep
spec:
  secretStoreRef:
    {{- if .Values.secrets.externalSecrets.clusterSecretStore }}
    name: {{ .Values.secrets.externalSecrets.secretStore }}
    kind: ClusterSecretStore
    {{- else }}
    name: {{ .Values.secrets.externalSecrets.secretStore }}
    kind: SecretStore
    {{- end }}
  refreshInterval: {{ .Values.secrets.externalSecrets.refreshInterval | default "1h" }}
  target:
    name: {{ .Release.Name }}-dragonfly-password
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        password: "{{ `{{ .dragonflyPassword }}` }}"
  data:
    - secretKey: dragonflyPassword
      remoteRef:
        key: {{ .Values.secrets.externalSecrets.paths.dragonflyPassword }}
{{- end }}

{{- if and .Values.archiving.enabled (not .Values.archiving.s3.existingSecret) }}
---
# External Secret for S3 Archiving Credentials
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "dependency-control.fullname" . }}-s3-credentials
  labels:
    {{- include "dependency-control.labels" . | nindent 4 }}
spec:
  secretStoreRef:
    {{- if .Values.secrets.externalSecrets.clusterSecretStore }}
    name: {{ .Values.secrets.externalSecrets.secretStore }}
    kind: ClusterSecretStore
    {{- else }}
    name: {{ .Values.secrets.externalSecrets.secretStore }}
    kind: SecretStore
    {{- end }}
  refreshInterval: {{ .Values.secrets.externalSecrets.refreshInterval | default "1h" }}
  target:
    name: {{ include "dependency-control.fullname" . }}-s3-credentials
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        access-key: "{{ `{{ .s3AccessKey }}` }}"
        secret-key: "{{ `{{ .s3SecretKey }}` }}"
  data:
    - secretKey: s3AccessKey
      remoteRef:
        key: {{ .Values.secrets.externalSecrets.paths.s3AccessKey | default "app/dependency-control/s3-access-key" }}
    - secretKey: s3SecretKey
      remoteRef:
        key: {{ .Values.secrets.externalSecrets.paths.s3SecretKey | default "app/dependency-control/s3-secret-key" }}
{{- end }}

{{- if and .Values.archiving.enabled .Values.archiving.encryption.enabled (not .Values.archiving.encryption.existingSecret) }}
