  target:
    name: {{ include "dependency-control.fullname" . }}-archive-encryption
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        encryption-key: "{{ `{{ .archiveEncryptionKey }}` }}"
  data:
    - secretKey: archiveEncryptionKey
      remoteRef:
        key: {{ .Values.secrets.externalSecrets.paths.archiveEncryptionKey | default "app/dependency-control/archive-encryption-key" }}
{{- end }}
{{- end }}
