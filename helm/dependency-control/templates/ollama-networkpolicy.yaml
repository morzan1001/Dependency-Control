{{- if and .Values.ollama.enabled .Values.networkPolicy.enabled }}
# Deny all traffic to/from Ollama by default, with selective egress for model pull.
#
# Security trade-off: egress to port 443 (HTTPS) and port 53 (DNS) is permitted so
# that the model-pull initContainer can download the model from registry.ollama.ai on
# first deploy (and on any deploy where the PVC is empty). Without this the initContainer
# cannot reach the registry and the pod will never become ready.
#
# Mitigations that limit the blast radius:
#   - automountServiceAccountToken: false — pod carries no cluster credentials
#   - all Linux capabilities dropped — container cannot escape to the node
#   - Ollama is a closed binary with no user-supplied code execution paths
# Accepting this risk is the only way to make the chat feature functional out of the box.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "dependency-control.fullname" . }}-ollama-deny-all
  labels:
    app.kubernetes.io/component: ollama
    {{- include "dependency-control.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: ollama
      {{- include "dependency-control.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  egress:
    # DNS — required for registry hostname resolution.
    # Port-only rule (no peer restriction) so that this works across all GKE
    # DNS configurations: kube-dns ClusterIP, NodeLocal DNS Cache via the
    # link-local 169.254.20.10 address, or a future CoreDNS-based setup.
    # DNS answers only return to the requesting pod, so this does not
    # meaningfully widen the attack surface.
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # HTTPS — required for registry.ollama.ai model pull
    # (destination IPs cannot be pinned without a service-mesh egress policy)
    - ports:
        - protocol: TCP
          port: 443
  # Only allow ingress from backend
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: backend
              {{- include "dependency-control.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 11434
{{- end }}
