# Production values overlay for GKE deployment with NVIDIA L4 GPU for Ollama.
#
# Usage: helm upgrade --install dc ./helm/dependency-control \
#          -f helm/dependency-control/values.yaml \
#          -f helm/dependency-control/production_values.yaml
#
# Requires a dedicated GPU node pool, e.g.:
#   gcloud container node-pools create gpu-l4 \
#     --cluster=prod-1 --zone=europe-west1-b \
#     --machine-type=g2-standard-8 \
#     --accelerator=type=nvidia-l4,count=1,gpu-driver-version=latest \
#     --node-taints=nvidia.com/gpu=present:NoSchedule \
#     --enable-autoscaling --min-nodes=0 --max-nodes=1

ollama:
  gpu:
    enabled: true
    count: 1
  resources:
    requests:
      memory: "20Gi"
      cpu: "4"
      nvidia.com/gpu: "1"
    limits:
      memory: "24Gi"
      cpu: "8"
      nvidia.com/gpu: "1"
  persistence:
    storageClass: standard-rwo
  nodeSelector:
    cloud.google.com/gke-nodepool: gpu-l4
  tolerations:
    - key: nvidia.com/gpu
      operator: Equal
      value: present
      effect: NoSchedule
