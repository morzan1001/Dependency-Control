apiVersion: v2
name: dependency-control
description: A Helm chart for Dependency Control with HA MongoDB, DragonflyDB Cache, and Traefik
type: application
version: 1.4.79
appVersion: "1.4.79"
icon: file://logo.png
annotations:
  artifacthub.io/license: MIT
dependencies:
  - name: community-operator
    version: 0.13.0
    repository: https://mongodb.github.io/helm-charts
    alias: mongodb-operator
    condition: mongodb-operator.enabled
  # Percona PSMDB Operator is now installed separately in percona-system namespace.
  # Install: helm install psmdb-operator percona/psmdb-operator -n percona-system --set watchNamespace=dependency-control
  # Dragonfly is now managed via the Dragonfly Operator CR (see dragonfly-cr.yaml)
  # The operator must be installed separately in the cluster.
  - name: traefik
    version: 37.4.0
    repository: https://traefik.github.io/charts
    condition: traefik.enabled
  - name: cert-manager
    version: v1.19.2
    repository: https://charts.jetstack.io
    condition: cert-manager.enabled
