name: Backend CI

# Reusable workflow — invoked by ci.yml. Standalone push/pull_request triggers
# are intentionally absent so the master orchestrator is the single entry point;
# this keeps SonarCloud's wait-for-tests dependency well-defined and prevents
# duplicate runs from the two trigger paths overlapping.
on:
  workflow_call:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install poetry
          cd backend
          poetry install --no-interaction

      - name: Ruff lint
        run: |
          cd backend
          poetry run ruff check .

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install poetry
          cd backend
          poetry install --no-interaction

      - name: Run tests with coverage
        run: |
          cd backend
          poetry run pytest --cov=app --cov-branch --cov-report=xml:coverage.xml --tb=short -q
          sed -i 's|<source>app</source>|<source>backend/app</source>|g' coverage.xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: backend-coverage
          path: backend/coverage.xml
          retention-days: 7

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install poetry
          cd backend
          poetry install --no-interaction

      - name: Mypy type check
        run: |
          cd backend
          poetry run mypy app --ignore-missing-imports
