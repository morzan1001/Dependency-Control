name: Backend CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'backend/**'
      - '.github/workflows/ci-backend.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'backend/**'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install poetry
          cd backend
          poetry install --no-interaction

      - name: Ruff lint
        run: |
          cd backend
          poetry run ruff check .

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install poetry
          cd backend
          poetry install --no-interaction

      - name: Run tests with coverage
        run: |
          cd backend
          poetry run pytest --cov=app --cov-branch --cov-report=xml:coverage.xml --tb=short -q
          # Fix source paths for SonarCloud (scanner runs from repo root, not backend/)
          sed -i 's|<source>app</source>|<source>backend/app</source>|g' coverage.xml

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install poetry
          cd backend
          poetry install --no-interaction

      - name: Mypy type check
        run: |
          cd backend
          poetry run mypy app --ignore-missing-imports
