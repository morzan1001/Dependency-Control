name: SonarCloud

# Reusable workflow — invoked by ci.yml after backend + frontend tests finish.
# Artifacts uploaded by the child workflows in the same orchestrated run are
# available here via actions/download-artifact (no run-id needed — same run
# context), so no tests are re-executed and no workflow_run plumbing is needed.
on:
  workflow_call:

jobs:
  scan:
    name: Analysis
    runs-on: ubuntu-latest
    # Skip on fork PRs — GitHub doesn't pass SONAR_TOKEN to them anyway, and
    # explicitly opting out documents the token-exfiltration mitigation.
    if: >-
      ${{
        github.event_name != 'pull_request' ||
        github.event.pull_request.head.repo.full_name == github.repository
      }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Download backend coverage
        uses: actions/download-artifact@v8
        with:
          name: backend-coverage
          path: backend

      - name: Download frontend coverage
        uses: actions/download-artifact@v8
        with:
          name: frontend-coverage
          path: frontend/coverage

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v8
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
